services:
  grobid:
    image: lfoppiano/grobid:0.8.1
    container_name: scirag-grobid
    ports:
      - "8070:8070"
    environment:
      - JAVA_OPTS=-Xmx4g -Xms1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070/api/isalive"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: scirag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
